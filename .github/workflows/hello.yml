name: step Java Workflow

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Java 버전 확인
        run: java -version

      - name: Gradle 버전 확인
        run: gradle --version

      - name: 커밋 sha 출력
        run: echo "${{ github.sha }} 님"