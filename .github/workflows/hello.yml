name: needs

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: '배포 환경'
        required: true
        default: 'main'
        type: choice
        options: [main]
      version:
        description: '배포 버전'
        required: false
        default: 'latest'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "테스트 실행"
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - run: echo "빌드 실행"

  notify:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: echo "배포 완료 알림"