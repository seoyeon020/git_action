name: PR 검증

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PR 정보 출력
        run: |
          echo "PR 번호: ${{ github.event.number }}"
          echo "PR 제목: ${{ github.event.pull_request.title }}"
          echo "작성자: ${{ github.actor }}"
          echo "베이스 브랜치: ${{ github.base_ref }}"
          echo "소스 브랜치: ${{ github.head_ref }}"